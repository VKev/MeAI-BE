services:
  ai-microservice:
    build:
      context: ../Microservices
      dockerfile: ./Ai.Microservice/dockerfile
      args:
        SERVICE_NAME: Ai.Microservice
    image: ai-microservice
    container_name: ai-microservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001
      Database__Host: postgres
      Database__Port: 5432
      Database__Name: aidb
      Database__Username: postgres
      Database__Password: changeme
      Database__Provider: postgres
      RabbitMq__Host: rabbit-mq
      RabbitMq__Port: 5672
      RabbitMq__Username: rabbitmq
      RabbitMq__Password: changeme
      Redis__Host: redis
      Redis__Password: changeme
      Redis__Port: 6379
      Jwt__SecretKey: changeme-at-least-32-chars----------------
      Jwt__Issuer: UserMicroservice
      Jwt__Audience: MicroservicesApp
      Jwt__ExpirationMinutes: 60
      AutoApply__Migrations: "true"
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:3030
      Cors__AllowedOrigins__2: http://localhost:2406
      Kie__ApiKey: your-kie-api-key
      Kie__CallbackUrl: http://api-gateway:8080/api/Ai/kie/callback
      N8n__BaseUrl: http://nginx:5678/n8n
      N8n__ScheduledAgentJobPath: /webhook/meai/scheduled-agent-job
      N8n__WebSearchPath: /webhook/meai/web-search
      N8n__CallbackBaseUrl: http://api-gateway:8080
      N8n__RuntimeCallbackPath: /api/Ai/internal/agent-schedules/runtime-result
      N8n__InternalCallbackToken: local-agent-schedule-callback-token
    depends_on:
      postgres:
        condition: service_healthy
      rabbit-mq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  user-microservice:
    build:
      context: ../Microservices
      dockerfile: ./User.Microservice/dockerfile
      args:
        SERVICE_NAME: User.Microservice
    image: user-microservice
    container_name: user-microservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5002
      Database__Host: postgres
      Database__Port: 5432
      Database__Name: userdb
      Database__Username: postgres
      Database__Password: changeme
      Database__Provider: postgres
      Database__SslMode: Disable
      RabbitMq__Host: rabbit-mq
      RabbitMq__Port: 5672
      RabbitMq__Username: rabbitmq
      RabbitMq__Password: changeme
      Redis__Host: redis
      Redis__Password: changeme
      Redis__Port: 6379
      Jwt__SecretKey: changeme-at-least-32-chars----------------
      Jwt__Issuer: UserMicroservice
      Jwt__Audience: MicroservicesApp
      Jwt__ExpirationMinutes: 60
      Admin__Username: admin
      Admin__Password: 12345678
      Admin__Email: admin@gmail.com
      Admin__FullName: MeAI Admin
      DefaultUser__Username: user
      DefaultUser__Password: 12345678
      DefaultUser__Email: user@gmail.com
      DefaultUser__FullName: MeAI User
      DefaultUser__RoleName: USER
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: https://your-frontend.example.com
      Cors__AllowedOrigins__2: http://localhost:2406
      Cors__AllowedOrigins__3: http://localhost:3030
      Google__ClientId: your-google-client-id
      TikTok__ClientKey: your-tiktok-client-key
      TikTok__ClientSecret: your-tiktok-client-secret
      TikTok__RedirectUri: http://api-gateway:8080/api/User/tiktok/callback
      Threads__AppId: your-meta-app-id
      Threads__AppSecret: your-meta-app-secret
      Threads__RedirectUri: http://api-gateway:2406/api/User/threads/callback
      AutoApply__Migrations: "true"
      FeedSeed__Enabled: "true"
      FeedSeed__DataRoot: /feed-seed-data
      FeedSeed__PublicBaseUrl: http://localhost:2406
    volumes:
      - ./seed-data/feed:/feed-seed-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbit-mq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  notification-microservice:
    build:
      context: ../Microservices
      dockerfile: ./Notification.Microservice/dockerfile
      args:
        SERVICE_NAME: Notification.Microservice
    image: notification-microservice
    container_name: notification-microservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5006
      Database__Host: postgres
      Database__Port: 5432
      Database__Name: notificationdb
      Database__Username: postgres
      Database__Password: changeme
      Database__Provider: postgres
      Database__SslMode: Disable
      RabbitMq__Host: rabbit-mq
      RabbitMq__Port: 5672
      RabbitMq__Username: rabbitmq
      RabbitMq__Password: changeme
      Redis__Host: redis
      Redis__Password: changeme
      Redis__Port: 6379
      Jwt__SecretKey: changeme-at-least-32-chars----------------
      Jwt__Issuer: UserMicroservice
      Jwt__Audience: MicroservicesApp
      Jwt__ExpirationMinutes: 60
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: https://your-frontend.example.com
      Cors__AllowedOrigins__2: http://localhost:2406
      Cors__AllowedOrigins__3: http://localhost:3030
      AutoApply__Migrations: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbit-mq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  feed-microservice:
    build:
      context: ../Microservices
      dockerfile: ./Feed.Microservice/dockerfile
      args:
        SERVICE_NAME: Feed.Microservice
    image: feed-microservice
    container_name: feed-microservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5007
      Database__Host: postgres
      Database__Port: 5432
      Database__Name: feeddb
      Database__Username: postgres
      Database__Password: changeme
      Database__Provider: postgres
      Database__SslMode: Disable
      RabbitMq__Host: rabbit-mq
      RabbitMq__Port: 5672
      RabbitMq__Username: rabbitmq
      RabbitMq__Password: changeme
      Redis__Host: redis
      Redis__Password: changeme
      Redis__Port: 6379
      Jwt__SecretKey: changeme-at-least-32-chars----------------
      Jwt__Issuer: UserMicroservice
      Jwt__Audience: MicroservicesApp
      Jwt__ExpirationMinutes: 60
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: https://your-frontend.example.com
      Cors__AllowedOrigins__2: http://localhost:2406
      Cors__AllowedOrigins__3: http://localhost:3030
      UserService__GrpcUrl: http://user-microservice:5004
      AiService__GrpcUrl: http://ai-microservice:5005
      FeedService__GrpcUrl: http://feed-microservice:5008
      AutoApply__Migrations: "true"
      FeedSeed__Enabled: "true"
      FeedSeed__DataRoot: /feed-seed-data
      FeedSeed__PublicBaseUrl: http://localhost:2406
    volumes:
      - ./seed-data/feed:/feed-seed-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbit-mq:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-microservice:
        condition: service_started
      ai-microservice:
        condition: service_started
    networks:
      - app-network

  api-gateway:
    build:
      context: ../Microservices
      dockerfile: ./ApiGateway/dockerfile
    image: api-gateway
    container_name: api-gateway
    ports:
      - "2406:8080"
    environment:
      ENABLE_DOCS_UI: true
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:3030
      Cors__AllowedOrigins__2: http://localhost:2406
      Services__User__Host: user-microservice
      Services__User__Port: 5002
      Services__Ai__Host: ai-microservice
      Services__Ai__Port: 5001
      Services__Notification__Host: notification-microservice
      Services__Notification__Port: 5006
      Services__Feed__Host: feed-microservice
      Services__Feed__Port: 5007
      Jwt__SecretKey: changeme-at-least-32-chars----------------
      Jwt__Issuer: UserMicroservice
      Jwt__Audience: MicroservicesApp
      Jwt__ExpirationMinutes: 60
    networks:
      - app-network


  rabbit-mq:
    image: rabbitmq:3-management
    container_name: rabbit-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: changeme
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "changeme"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n-import:
    image: n8nio/n8n:latest
    container_name: n8n-import
    restart: "no"
    command:
      - import:workflow
      - --separate
      - --input=/workspace/n8n-local/workflows
    environment:
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-local:/workspace/n8n-local:ro
    networks:
      - app-network

  n8n-activate-scheduled-agent-job:
    image: n8nio/n8n:latest
    container_name: n8n-activate-scheduled-agent-job
    restart: "no"
    command:
      - update:workflow
      - --id=meai-scheduled-agent-job
      - --active=true
    environment:
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-import:
        condition: service_completed_successfully
    networks:
      - app-network

  n8n-activate-web-search:
    image: n8nio/n8n:latest
    container_name: n8n-activate-web-search
    restart: "no"
    command:
      - update:workflow
      - --id=meai-web-search
      - --active=true
    environment:
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-activate-scheduled-agent-job:
        condition: service_completed_successfully
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      n8n-activate-web-search:
        condition: service_completed_successfully
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: false
      N8N_PATH: /n8n/
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      TZ: Asia/Ho_Chi_Minh
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_BLOCK_ENV_ACCESS_IN_NODE: false
      N8N_DIAGNOSTICS_ENABLED: false
      N8N_VERSION_NOTIFICATIONS_ENABLED: false
      N8N_TEMPLATES_ENABLED: false
      N8N_METRICS: true
      QUEUE_HEALTH_CHECK_ACTIVE: true
      NODE_OPTIONS: --max-old-space-size=512
      N8N_EDITOR_BASE_URL: http://localhost:5678/n8n/
      WEBHOOK_URL: http://localhost:5678/n8n/
      VUE_APP_URL_BASE_API: http://localhost:5678/n8n/
      BRAVE_SEARCH_API_KEY: change-me
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-local:/workspace/n8n-local:ro
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - n8n
    ports:
      - "5678:5678"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  rabbitmq-data:
  redis-data:
  n8n_data:
  postgres-data:
