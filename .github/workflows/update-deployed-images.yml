name: Update Deployed EKS Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to use."
        type: string
        default: infrastructure-khanghv2406
        required: true
      services:
        description: "Comma-separated service folders to update, or all."
        type: string
        default: all
        required: true
      cluster_name:
        description: "Optional EKS cluster name. Leave empty to derive from project_name."
        type: string
        default: ""
        required: false
      namespace:
        description: "Optional Kubernetes namespace. Leave empty to use project_name."
        type: string
        default: ""
        required: false
      rollout_timeout:
        description: "kubectl rollout status timeout."
        type: string
        default: 15m
        required: true
      skip_missing_deployments:
        description: "Skip services whose deployment does not exist yet."
        type: choice
        options: ["false", "true"]
        default: "false"
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || '' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || '' }}
  ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || '' }}

permissions:
  contents: read

jobs:
  discover-services:
    name: Discover Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.get-services.outputs.services }}
      service_count: ${{ steps.get-services.outputs.service_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover selected microservices
        id: get-services
        env:
          REQUESTED_SERVICES: ${{ inputs.services }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          base = Path("Backend/Microservices")
          services = []
          if base.exists():
              for item in sorted(base.iterdir()):
                  if not item.is_dir() or item.name.lower() == "sharedlibrary":
                      continue
                  if any((item / name).is_file() for name in ("Dockerfile", "dockerfile", "DockerFile")):
                      services.append(item.name)

          requested_raw = os.environ.get("REQUESTED_SERVICES", "all").strip()
          if requested_raw and requested_raw.lower() != "all":
              requested = [part.strip() for part in requested_raw.split(",") if part.strip()]
              by_lower = {service.lower(): service for service in services}
              selected = []
              missing = []
              for service in requested:
                  match = by_lower.get(service.lower())
                  if match:
                      selected.append(match)
                  else:
                      missing.append(service)
              if missing:
                  raise SystemExit(f"Requested service(s) not found or missing Dockerfile: {', '.join(missing)}")
              services = selected

          services_json = json.dumps(services)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"services={services_json}\n")
              output.write(f"service_count={len(services)}\n")
          print(f"Selected services: {services_json}")
          PY

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: discover-services
    if: ${{ needs.discover-services.outputs.services != '[]' }}
    environment:
      name: ${{ inputs.environment }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge tfvars for build settings
        working-directory: Terraform
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          cp ../terraform-var/*.auto.tfvars . 2>/dev/null || true
          cp ../terraform-vars/*.auto.tfvars . 2>/dev/null || true
          cp ../Terraform-vars/*.auto.tfvars . 2>/dev/null || true

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          echo "$SECRETS_JSON" \
            | jq -r 'to_entries[] | select(.key | startswith("TERRAFORM_VARS_")) | .key' \
            | while read -r key; do
                suffix=${key#TERRAFORM_VARS_}
                norm=$(echo "$suffix" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed 's/^\s\+//;s/\s\+$//' \
                  | tr ' /\\' '___' )
                value=$(jq -r --arg k "$key" '.[$k]' <<< "$SECRETS_JSON")
                if echo "$value" | jq -e . >/dev/null 2>&1; then
                  case "$norm" in
                    *.auto.tfvars.json|*.tfvars.json) filename="$norm";;
                    *.auto.tfvars|*.tfvars)           filename="$norm.json";;
                    *)                                 filename="$norm.auto.tfvars.json";;
                  esac
                else
                  case "$norm" in
                    *.auto.tfvars|*.tfvars)           filename="$norm";;
                    *.auto.tfvars.json|*.tfvars.json) filename="${norm%.json}";;
                    *)                                 filename="$norm.auto.tfvars";;
                  esac
                fi
                printf '%s' "$value" > "$filename"
              done

          sudo apt-get update -y >/dev/null
          sudo apt-get install -y python3-pip >/dev/null
          python3 -m pip install --user python-hcl2 >/dev/null
          export PATH="$HOME/.local/bin:$PATH"
          python3 scripts/merge_tfvars.py

          for f in *.auto.tfvars *.auto.tfvars.json; do
            [ "$f" = "00-all.auto.tfvars.json" ] && continue || true
            rm -f "$f" || true
          done

      - name: Load project/region from Terraform vars
        run: python Terraform/scripts/export_tf_env.py >> "$GITHUB_ENV"
        env:
          TF_ENV_FALLBACK_PROJECT: ${{ env.PROJECT_NAME }}
          TF_ENV_FALLBACK_REGION: ${{ env.AWS_REGION }}

      - name: Ensure AWS region fallback
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          fi

      - name: Derive ECR repo name from Terraform vars
        run: |
          REPO="${{ env.ECR_REPO_NAME }}"
          if [ -z "$REPO" ] || [ "$REPO" = "default" ]; then
            if [ -f Terraform/00-all.auto.tfvars.json ]; then
              REPO_FROM_TFVARS=$(jq -r '
                def repo_name:
                  if type == "string" and test("/") then split("/")[-1] else empty end;
                [
                  try (.services.user.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.services.apigateway.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.services.ai.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.k8s_microservices_manifest | capture("image:\\s+[^\\s/]+/(?<repo>[^\\s:]+):(Ai\\.Microservice|User\\.Microservice|ApiGateway|Notification\\.Microservice|Feed\\.Microservice|Rag\\.Microservice)-latest").repo) catch empty
                ] | map(select(. != "" and . != "null")) | .[0] // ""
              ' Terraform/00-all.auto.tfvars.json)
            else
              REPO_FROM_TFVARS=""
            fi
            REPO="${REPO_FROM_TFVARS:-${PROJECT_NAME:-default}-${{ inputs.environment }}-ecr}"
          fi
          echo "ECR_REPO_NAME=$REPO" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: set-tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          if aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Repository $ECR_REPO_NAME already exists."
          else
            create_output=$(aws ecr create-repository --repository-name "$ECR_REPO_NAME" --region "$AWS_REGION" 2>&1) || {
              if echo "$create_output" | grep -q "RepositoryAlreadyExistsException"; then
                echo "Repository $ECR_REPO_NAME was created by another matrix job."
              else
                echo "$create_output" >&2
                exit 1
              fi
            }
          fi

      - name: Detect Dockerfile path
        id: dockerfile
        run: |
          BASE="Backend/Microservices/${{ matrix.service }}"
          for name in Dockerfile dockerfile DockerFile; do
            if [ -f "$BASE/$name" ]; then
              echo "path=$BASE/$name" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No Dockerfile found under $BASE" >&2
          exit 1

      - name: Build and push image to Amazon ECR
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}
        with:
          context: Backend/Microservices
          file: ${{ steps.dockerfile.outputs.path }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_NAME }}:${{ matrix.service }}-${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_NAME }}:${{ matrix.service }}-latest
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_NAME }}:${{ matrix.service }}-cache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_NAME }}:${{ matrix.service }}-cache,mode=max
          platforms: linux/amd64

  rollout:
    name: Roll Out to Existing EKS Deployments
    runs-on: ubuntu-latest
    needs: [discover-services, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Merge tfvars for rollout settings
        working-directory: Terraform
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          cp ../terraform-var/*.auto.tfvars . 2>/dev/null || true
          cp ../terraform-vars/*.auto.tfvars . 2>/dev/null || true
          cp ../Terraform-vars/*.auto.tfvars . 2>/dev/null || true

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          echo "$SECRETS_JSON" \
            | jq -r 'to_entries[] | select(.key | startswith("TERRAFORM_VARS_")) | .key' \
            | while read -r key; do
                suffix=${key#TERRAFORM_VARS_}
                norm=$(echo "$suffix" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed 's/^\s\+//;s/\s\+$//' \
                  | tr ' /\\' '___' )
                value=$(jq -r --arg k "$key" '.[$k]' <<< "$SECRETS_JSON")
                if echo "$value" | jq -e . >/dev/null 2>&1; then
                  case "$norm" in
                    *.auto.tfvars.json|*.tfvars.json) filename="$norm";;
                    *.auto.tfvars|*.tfvars)           filename="$norm.json";;
                    *)                                 filename="$norm.auto.tfvars.json";;
                  esac
                else
                  case "$norm" in
                    *.auto.tfvars|*.tfvars)           filename="$norm";;
                    *.auto.tfvars.json|*.tfvars.json) filename="${norm%.json}";;
                    *)                                 filename="$norm.auto.tfvars";;
                  esac
                fi
                printf '%s' "$value" > "$filename"
              done

          sudo apt-get update -y >/dev/null
          sudo apt-get install -y python3-pip >/dev/null
          python3 -m pip install --user python-hcl2 >/dev/null
          export PATH="$HOME/.local/bin:$PATH"
          python3 scripts/merge_tfvars.py

          for f in *.auto.tfvars *.auto.tfvars.json; do
            [ "$f" = "00-all.auto.tfvars.json" ] && continue || true
            rm -f "$f" || true
          done

      - name: Load project/region from Terraform vars
        run: python Terraform/scripts/export_tf_env.py >> "$GITHUB_ENV"
        env:
          TF_ENV_FALLBACK_PROJECT: ${{ env.PROJECT_NAME }}
          TF_ENV_FALLBACK_REGION: ${{ env.AWS_REGION }}

      - name: Ensure AWS region fallback
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          fi

      - name: Derive ECR repo name from Terraform vars
        run: |
          REPO="${{ env.ECR_REPO_NAME }}"
          if [ -z "$REPO" ] || [ "$REPO" = "default" ]; then
            if [ -f Terraform/00-all.auto.tfvars.json ]; then
              REPO_FROM_TFVARS=$(jq -r '
                def repo_name:
                  if type == "string" and test("/") then split("/")[-1] else empty end;
                [
                  try (.services.user.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.services.apigateway.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.services.ai.ecs_container_image_repository_url | repo_name) catch empty,
                  try (.k8s_microservices_manifest | capture("image:\\s+[^\\s/]+/(?<repo>[^\\s:]+):(Ai\\.Microservice|User\\.Microservice|ApiGateway|Notification\\.Microservice|Feed\\.Microservice|Rag\\.Microservice)-latest").repo) catch empty
                ] | map(select(. != "" and . != "null")) | .[0] // ""
              ' Terraform/00-all.auto.tfvars.json)
            else
              REPO_FROM_TFVARS=""
            fi
            REPO="${REPO_FROM_TFVARS:-${PROJECT_NAME:-default}-${{ inputs.environment }}-ecr}"
          fi
          echo "ECR_REPO_NAME=$REPO" >> "$GITHUB_ENV"

      - name: Resolve cluster and namespace
        env:
          CLUSTER_NAME_INPUT: ${{ inputs.cluster_name }}
          NAMESPACE_INPUT: ${{ inputs.namespace }}
        run: |
          set -euo pipefail

          if [ -n "$CLUSTER_NAME_INPUT" ]; then
            CLUSTER_NAME="$CLUSTER_NAME_INPUT"
          else
            project_slug=$(printf '%s' "$PROJECT_NAME" | tr '_' '-')
            prefix=$(printf '%s' "$project_slug" | cut -c1-18)
            hash=$(printf '%s' "$PROJECT_NAME" | md5sum | cut -c1-4)
            CLUSTER_NAME="${prefix}-${hash}-eks"
          fi

          if [ -n "$NAMESPACE_INPUT" ]; then
            K8S_NAMESPACE="$NAMESPACE_INPUT"
          else
            K8S_NAMESPACE="$PROJECT_NAME"
          fi

          echo "EKS_CLUSTER_NAME=$CLUSTER_NAME" >> "$GITHUB_ENV"
          echo "K8S_NAMESPACE=$K8S_NAMESPACE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubeconfig
        run: |
          aws eks describe-cluster --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME" >/dev/null
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Update deployment images
        env:
          SERVICES: ${{ needs.discover-services.outputs.services }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SKIP_MISSING_DEPLOYMENTS: ${{ inputs.skip_missing_deployments }}
          ROLLOUT_TIMEOUT: ${{ inputs.rollout_timeout }}
        run: |
          set -euo pipefail

          map_service() {
            case "$1" in
              Ai.Microservice) echo "ai-microservice ai-microservice" ;;
              User.Microservice) echo "user-microservice user-microservice" ;;
              ApiGateway) echo "api-gateway api-gateway" ;;
              Notification.Microservice) echo "notification-microservice notification-microservice" ;;
              Feed.Microservice) echo "feed-microservice feed-microservice" ;;
              Rag.Microservice) echo "rag-microservice rag-microservice" ;;
              *) echo "" ;;
            esac
          }

          echo "## EKS Image Rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Deployment | Image | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$SERVICES" | jq -r '.[]' | while read -r service; do
            mapping=$(map_service "$service")
            if [ -z "$mapping" ]; then
              echo "No deployment mapping exists for service $service" >&2
              exit 1
            fi

            deployment=$(echo "$mapping" | awk '{print $1}')
            container=$(echo "$mapping" | awk '{print $2}')
            image="${ECR_REGISTRY}/${ECR_REPO_NAME}:${service}-${IMAGE_TAG}"

            if ! kubectl -n "$K8S_NAMESPACE" get deployment "$deployment" >/dev/null 2>&1; then
              if [ "$SKIP_MISSING_DEPLOYMENTS" = "true" ]; then
                echo "| $service | $deployment | $image | skipped: deployment missing |" >> "$GITHUB_STEP_SUMMARY"
                continue
              fi
              echo "Deployment $deployment does not exist in namespace $K8S_NAMESPACE" >&2
              exit 1
            fi

            echo "Updating $deployment/$container to $image"
            kubectl -n "$K8S_NAMESPACE" set image "deployment/$deployment" "$container=$image"
            kubectl -n "$K8S_NAMESPACE" rollout status "deployment/$deployment" --timeout="$ROLLOUT_TIMEOUT"
            echo "| $service | $deployment | $image | rolled out |" >> "$GITHUB_STEP_SUMMARY"
          done

